  - cellType: TEXT
    cellId: 019e65ad-d54e-7000-8924-7dcb7f1eeef7 # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
    config:
      richText:
        - type: h3
          children:
            - text: "2. Max Status Logic (CTE: "
            - code: true
              text: max_status_reached
            - text: )
        - type: p
          children:
            - text: ""
        - type: paragraph
          children:
            - text: "Calculated the furthest point each subscription reached using "
            - code: true
              text: MAX(status_id)
            - text: " from the "
            - code: true
              text: Payment_Status_Log
            - text: ", grouped by "
            - code: true
              text: subscription_id
            - text: ". Because the happy-path statuses (1–5) are in chronological order, "
            - code: true
              text: MAX
            - text: " reliably identifies the furthest step reached — even when a subscription retried after an error."
        - type: paragraph
          children:
            - text: ""
        - type: h4
          children:
            - bold: true
              text: "Note:"
            - text: " "
        - type: p
          children:
            - text: "A subscription can cycle backward through statuses after an error and retry. Using "
            - code: true
              text: MAX
            - text: " ensures we credit each subscription with the furthest point they genuinely reached, not just where they currently sit. However, "
            - code: true
              text: max_status
            - text: " alone is not enough — a subscription stuck at an error after reaching status 4 looks identical to one cleanly at status 4 without combining the current status."
        - type: h3
          children:
            - text: ""
  - cellType: SQL
    cellId: 019e65ad-d595-7000-8929-22b94d0675ad # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
