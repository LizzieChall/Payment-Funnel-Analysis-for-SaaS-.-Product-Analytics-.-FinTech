  - cellType: TEXT
    cellId: 019e65ad-d54e-7000-8924-6f82187d1458 # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
    config:
      richText:
        - type: hr
          children:
            - text: ""
        - type: h2
          children:
            - bold: true
              text: "Case Study: Payment Funnel Analysis"
        - type: p
          children:
            - text: ""
        - type: paragraph
          children:
            - text: "The finance team has escalated a revenue concern: a significant number of customers who have signed up for a paid subscription plan are not completing payment. While customers are considered active upon signup, they are not counted as converted until payment is successfully processed. The gap between signups and completed payments has grown large enough to materially impact revenue, and leadership wants answers."
        - type: paragraph
          children:
            - text: "As the data analyst assigned to this investigation, you align with the product manager to map the end-to-end payment flow. The process works as follows: a customer opens the payment portal, enters their credit card details, and submits. That submission is routed to a third-party payment processor, which handles the actual card transaction. If the vendor confirms success, the payment is logged as complete on our side. Two distinct error points exist in this flow — one at the submission stage if the customer enters incorrect or incomplete information, and one at the vendor stage if the processor encounters an issue on their end."
        - type: paragraph
          children:
            - text: "Before any analysis can begin, you confirm data availability with the frontend and data engineering teams. All major payment portal events are captured in the "
            - code: true
              text: payment_status_log
            - text: ", giving you a reliable event-level record to work from."
        - type: paragraph
          children:
            - text: ""
        - type: paragraph
          children:
            - text: "Your objectives are:"
        - type: ul
          children:
            - type: li
              children:
                - type: lic
                  children:
                    - text: Track each subscription's progress through the payment funnel, accounting for subscriptions that hit errors, cycle back to earlier statuses, or stall without completing the process
            - type: li
              children:
                - type: lic
                  children:
                    - text: Quantify how common errors are across the funnel and determine whether they represent a significant business risk — and whether the response should differ for user-side errors versus vendor-side errors
            - type: li
              children:
                - type: lic
                  children:
                    - text: Translate your findings into clear product recommendations that reduce friction, increase payment completion, and can be presented back to the product manager and leadership team
  - cellType: CODE
    cellId: 019e65c1-d81f-7ffb-b22a-7fd90b0608d5 # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
