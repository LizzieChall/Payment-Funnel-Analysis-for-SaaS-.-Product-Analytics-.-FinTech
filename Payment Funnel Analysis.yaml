  - cellType: TEXT
    cellId: 019e65ad-d54e-7000-8924-83b04dfea190 # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
    config:
      richText:
        - type: h3
          children:
            - text: 3. Joining Max Status to Current Status
        - type: p
          children:
            - text: ""
        - type: paragraph
          children:
            - text: "Left-joined "
            - code: true
              text: max_status_reached
            - text: " onto the "
            - code: true
              text: Subscriptions
            - text: " table to bring in "
            - code: true
              text: current_payment_status
            - text: " alongside "
            - code: true
              text: max_status
            - text: " for each subscription. A "
            - bold: true
              text: LEFT JOIN
            - text: " was critical — an inner join would have silently dropped all 24 subscriptions that never entered the payment portal, removing the most important segment from the analysis entirely."
  - cellType: SQL
    cellId: 019e65ad-d595-7000-8929-384141dba6b2 # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
    config:
      source: |+
        with max_status_reached as(
        select 
            psl.subscription_id, 
            max(psl.status_id) as max_status 
        from 
            public.payment_status_log psl 
        group by 
            1
        )
        select 
            subs.subscription_id,
            current_payment_status,
            max_status
        from 
            public.subscriptions subs 
        left join
            max_status_reached m
            on subs.subscription_id = m.subscription_id

      dataFrameCell: false
      dataConnectionId: 34b92293-aaf9-485d-acf7-db69412e953d
      resultVariableName: dataframe_9
      useRichDisplay: true
      enablePreview: true
