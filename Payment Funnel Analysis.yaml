  - cellType: TEXT
    cellId: 019e65ad-d54e-7000-8924-77b3f61ea7d3 # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
    config:
      richText:
        - type: h3
          children:
            - text: 1. Exploratory Data Analysis (EDA)
        - type: paragraph
          children:
            - text: "Profiled the "
            - code: true
              text: Payment_Status_Log
            - text: " and "
            - code: true
              text: Payment_Status_Definitions
            - text: " tables joined together, ordering by "
            - code: true
              text: subscription_id
            - text: " and "
            - code: true
              text: movement_date
            - text: " to understand how individual subscriptions move through statuses over time. Spot-checked specific subscriptions to validate the data and understand edge cases — including subscriptions that cycle through statuses, hit errors, and retry."
        - type: paragraph
          children:
            - text: "For example, subscription "
            - code: true
              text: "#38844"
            - text: " hit an error at status 0 after submitting payment, cycled back to re-enter payment, and ultimately completed the full workflow through status 5. Subscription "
            - code: true
              text: "#38499"
            - text: " reached payment success (status 4) but then hit a vendor error and never reached completion — illustrating exactly why combining "
            - code: true
              text: max_status
            - text: " with "
            - code: true
              text: current_payment_status
            - text: |2
                 is necessary for accurate classification.
